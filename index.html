<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shuoce</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,#00ffff22 0%,transparent 25%),
radial-gradient(circle,#6a00ff22 0%,transparent 25%);
background-size:500px 500px;
animation:move 20s linear infinite;
}

@keyframes move{
0%{
transform:translate(-10%,-10%);
}
100%{
transform:translate(-40%,-40%);
}
}

.card{
position:relative;
z-index:2;
width:90%;
max-width:800px;
padding:50px;
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
text-align:center;
box-shadow:
0 0 30px rgba(0,255,255,.15),
0 0 60px rgba(111,0,255,.15);
}

.avatar{
width:130px;
height:130px;
margin:auto;
border-radius:50%;
background:linear-gradient(135deg,#00ffff,#6a00ff);
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
box-shadow:0 0 25px #00ffff;
}

h1{
margin-top:25px;
font-size:48px;
letter-spacing:3px;
}

.subtitle{
margin-top:10px;
font-size:18px;
opacity:.8;
}

.line{
width:100px;
height:3px;
background:#00ffff;
margin:25px auto;
box-shadow:0 0 15px #00ffff;
}

.desc{
font-size:16px;
line-height:1.8;
opacity:.9;
}

.links{
margin-top:35px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.links a{
padding:12px 24px;
border-radius:50px;
text-decoration:none;
color:white;
border:1px solid #00ffff66;
transition:.3s;
}

.links a:hover{
background:#00ffff;
color:black;
box-shadow:0 0 20px #00ffff;
}

.footer{
margin-top:30px;
font-size:13px;
opacity:.5;
}

@media(max-width:768px){

h1{
font-size:34px;
}

.card{
padding:30px;
}

.avatar{
width:100px;
height:100px;
font-size:36px;
}
}
</style>
</head>

<body>

<div class="card">

<div class="avatar">
S
</div>

<h1>SHUOCE</h1>

<div class="subtitle">
Developer · Explorer · Creator
</div>

<div class="line"></div>

<div class="desc">
欢迎来到我的数字空间。<br>
这里记录技术、创意、项目与成长。<br>
探索无限可能，创造属于自己的未来。
</div>

<div class="links">
<a href="https://github.com/shuoce" target="_blank">
GitHub
</a>

<a href="#">
Projects
</a>

<a href="#">
Blog
</a>

<a href="#">
Contact
</a>
</div>

<div class="footer">
© 2026 shuoce.eu.cc
</div>

</div>

</body>
</html>
