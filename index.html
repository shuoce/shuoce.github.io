<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硕策 导航页</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei",sans-serif;
}

body{
min-height:100vh;
color:#fff;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("background.jpg") center center no-repeat;
background-size:cover;
filter:blur(12px);
transform:scale(1.1);
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

.container{
max-width:1100px;
margin:40px auto;
padding:25px;
}

.panel{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
border-radius:30px;
padding:40px;
box-shadow:0 8px 40px rgba(0,0,0,.25);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:42px;
letter-spacing:3px;
margin-bottom:10px;
}

.time{
font-size:42px;
font-weight:bold;
}

.date{
opacity:.8;
margin-top:8px;
}

.search-box{
margin:35px auto;
max-width:700px;
}

.search-form{
display:flex;
gap:10px;
}

.search-form select{
padding:15px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.15);
color:white;
}

.search-form option{
color:black;
}

.search-form input{
flex:1;
padding:15px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.15);
color:white;
outline:none;
}

.search-form input::placeholder{
color:#ddd;
}

.search-form button{
padding:15px 25px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:bold;
background:#4fc3f7;
}

.section-title{
margin:20px 0;
font-size:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:18px;
}

.card{
text-decoration:none;
color:white;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:22px;
text-align:center;
transition:.25s;
}

.card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,.15);
}

.card i{
font-size:34px;
margin-bottom:12px;
display:block;
}

.card-title{
font-size:18px;
font-weight:bold;
}

.card-desc{
font-size:13px;
opacity:.75;
margin-top:5px;
}

.footer{
text-align:center;
margin-top:30px;
opacity:.6;
font-size:13px;
}

.quote-box{
    margin-top:25px;
    padding:18px;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);

    text-align:center;

    line-height:1.8;

    font-size:15px;

    color:white;
}
  
@media(max-width:768px){

.panel{
padding:25px;
}

.time{
font-size:30px;
}

.header h1{
font-size:30px;
}

.search-form{
flex-direction:column;
}

}
</style>
</head>

<body>

<div class="container">

<div class="panel">

<div class="header">
<h1>🐱 硕策 导航页</h1>

<div class="time" id="time">
00:00:00
</div>

<div class="date" id="date">
加载中...
</div>
</div>

<div class="search-box">

<form class="search-form" onsubmit="doSearch(event)">

<select id="engine">
<option value="google">Google</option>
<option value="bing">Bing</option>
</select>

<input
type="text"
id="keyword"
placeholder="输入关键词搜索..."
required
>

<button type="submit">
搜索
</button>

</form>

</div>

<div class="section-title">
常用网站
</div>

<div class="grid">

<a class="card" href="https://chatgpt.com" target="_blank">
<i class="bi bi-robot"></i>
<div class="card-title">ChatGPT</div>
<div class="card-desc">AI 助手</div>
</a>

<a class="card" href="https://www.doubao.com" target="_blank">
<i class="bi bi-lightning-charge"></i>
<div class="card-title">豆包</div>
<div class="card-desc">字节 AI</div>
</a>

<a class="card" href="https://www.wenxiaobai.com" target="_blank">
<i class="bi bi-chat-dots"></i>
<div class="card-title">问小白</div>
<div class="card-desc">智能问答</div>
</a>

<a class="card" href="https://www.youtube.com" target="_blank">
<i class="bi bi-youtube"></i>
<div class="card-title">YouTube</div>
<div class="card-desc">视频平台</div>
</a>

<a class="card" href="https://www.bilibili.com" target="_blank">
<i class="bi bi-play-btn"></i>
<div class="card-title">哔哩哔哩</div>
<div class="card-desc">Bilibili</div>
</a>

<a class="card" href="https://www.douyin.com" target="_blank">
<i class="bi bi-music-note-beamed"></i>
<div class="card-title">抖音</div>
<div class="card-desc">短视频</div>
</a>

<a class="card" href="https://x.com" target="_blank">
<i class="bi bi-twitter-x"></i>
<div class="card-title">X</div>
<div class="card-desc">社交平台</div>
</a>

</div>

<div class="quote-box">
    <div id="hitokoto">
        正在加载每日一言...
    </div>
</div> 
  
<div class="footer">
© 2026 shuoce.eu.cc
</div>

</div>

</div>

<script>
function updateTime(){

const now=new Date();

const time=now.toLocaleTimeString("zh-CN",{
hour12:false
});

const date=now.toLocaleDateString("zh-CN",{
year:"numeric",
month:"long",
day:"numeric",
weekday:"long"
});

document.getElementById("time").innerText=time;
document.getElementById("date").innerText=date;
}

setInterval(updateTime,1000);
updateTime();

function doSearch(e){

e.preventDefault();

const keyword=
encodeURIComponent(
document.getElementById("keyword").value
);

const engine=
document.getElementById("engine").value;

let url="";

if(engine==="google"){
url=
"https://www.google.com/search?q="+keyword;
}else{
url=
"https://www.bing.com/search?q="+keyword;
}

window.open(url,"_blank");
}
fetch("https://v1.hitokoto.cn/")
.then(res => res.json())
.then(data => {

document.getElementById("hitokoto").innerHTML =
`「${data.hitokoto}」<br><small>—— ${data.from}</small>`;

})
.catch(() => {

document.getElementById("hitokoto").innerHTML =
"保持热爱，奔赴山海。";

});  

</script>

</body>
</html>
