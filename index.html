.music-player{
position:fixed;

width:360px;
padding:22px;
border-radius:24px;

background:rgba(255,255,255,.08);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.18);

box-shadow:
0 12px 40px rgba(0,0,0,.35),
0 0 30px rgba(79,195,247,.18);

overflow:hidden;
z-index:9999;
transition:.35s ease;
}

/* 展开/收起 */

.music-player.hide{
transform:translateY(150%);
opacity:0;
pointer-events:none;
}

/* 流光 */

.music-player::before{

content:"";

position:absolute;

left:-50%;
top:-50%;

width:200%;
height:200%;

background:
linear-gradient(
120deg,
transparent,
rgba(79,195,247,.08),
transparent
);

animation:flow 10s linear infinite;

pointer-events:none;
}

@keyframes flow{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* 唱片封面 */

.music-cover{

width:76px;
height:76px;

margin:auto;

@keyframes spin{

from{

}

to{

}

<script>
function updateTime(){

const now=new Date();

const time=now.toLocaleTimeString("zh-CN",{
hour12:false
});

const date=now.toLocaleDateString("zh-CN",{
year:"numeric",
month:"long",
day:"numeric",
weekday:"long"
});

document.getElementById("time").innerText=time;
document.getElementById("date").innerText=date;
}

setInterval(updateTime,1000);
updateTime();

const hour = new Date().getHours();

let welcomeText="";

if(hour<6){

welcomeText="🌙 夜深了，早点休息";

}else if(hour<12){

welcomeText="☀️ 早上好";

}else if(hour<18){

welcomeText="🌤️ 下午好";

}else{

welcomeText="🌆 晚上好";

}

document.getElementById("welcome")
.innerText=welcomeText;
    
fetch("https://wttr.in/?format=j1")
.then(res=>res.json())
.then(data=>{

const temp =
data.current_condition[0].temp_C;

let desc =
data.current_condition[0].weatherDesc[0].value;

/* 英文转中文 */

const weatherMap = {

"Sunny":"晴天",
"Clear":"晴朗",
"Cloudy":"多云",
"Partly cloudy":"局部多云",

"Light rain":"小雨",
"Light rain shower":"阵雨",
"Patchy rain nearby":"附近有雨",

"Moderate rain":"中雨",
"Heavy rain":"大雨",

"Thunderstorm":"雷暴",

"Mist":"薄雾",
"Fog":"大雾",

"Snow":"下雪"

};

desc = weatherMap[desc] || desc;

/* 天气图标 */

let icon = "🌤️";

if(desc.includes("晴")){
icon="☀️";
}
else if(desc.includes("云")){
icon="☁️";
}
else if(desc.includes("雨")){
icon="🌧️";
}
else if(desc.includes("雷")){
icon="⛈️";
}
else if(desc.includes("雪")){
icon="❄️";
}

document.getElementById("weather").innerHTML =
`${icon} ${temp}°C · ${desc}`;

})
.catch(()=>{

document.getElementById("weather").innerHTML =
"🌤️ 天气获取失败";

});
    
function doSearch(e){

e.preventDefault();

const keyword=
encodeURIComponent(
document.getElementById("keyword").value
);

const engine=
document.getElementById("engine").value;

let url="";

if(engine==="google"){
url=
"https://www.google.com/search?q="+keyword;
}else{
url=
"https://www.bing.com/search?q="+keyword;
}

window.open(url,"_blank");
}
fetch("https://v1.hitokoto.cn/")
.then(res => res.json())
.then(data => {

document.getElementById("hitokoto").innerHTML =
`「${data.hitokoto}」<br><small>—— ${data.from}</small>`;

})
.catch(() => {

document.getElementById("hitokoto").innerHTML =
"保持热爱，奔赴山海。";

});  

function clearTheme(){

document.body.classList.remove(
"transparent-mode",
"dark-mode",
"light-mode"
);

}

function setTheme(mode){

clearTheme();

if(mode==="transparent"){
document.body.classList.add("transparent-mode");
}

if(mode==="dark"){
document.body.classList.add("dark-mode");
}

if(mode==="light"){
document.body.classList.add("light-mode");
}

localStorage.setItem("theme",mode);

}

const savedTheme =
localStorage.getItem("theme");

if(savedTheme){
setTheme(savedTheme);
    }

 const startDate =
new Date("2026-06-25");

const now =
new Date();

const days =
Math.floor(
(now-startDate)/86400000
);

document.getElementById("runtime")
.innerHTML=
`🚀 已运行 ${days} 天`;
 
/* ==========================
   macOS 音乐播放器控制
========================== */

const musicPlayer = document.getElementById("musicPlayer");
const musicCover = document.getElementById("musicCover");

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

audio.addEventListener("error", () => {
    console.log("音乐加载失败");
    playBtn.innerText = "▶";
    musicCover.classList.remove("playing");
});

const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

const musicTitle = document.getElementById("musicTitle");

const playlist = [
{
title:"奶酪",
src:"Personalization/Music/Music/奶酪.mp3"
}
];

let index = 0;

function loadSong(i){
audio.src = playlist[i].src;
musicTitle.innerText = playlist[i].title;
audio.load();
}

function format(t){
t = Math.floor(t || 0);
const m = Math.floor(t / 60);
const s = t % 60;
return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

/* 播放/暂停 */
playBtn.onclick = () => {
if(audio.paused){
audio.play();
playBtn.innerText = "⏸";
musicCover.classList.add("playing");
}else{
audio.pause();
playBtn.innerText = "▶";
musicCover.classList.remove("playing");
}
};

/* 上一首 */
prevBtn.onclick = () => {
index = (index - 1 + playlist.length) % playlist.length;
loadSong(index);
audio.play();
playBtn.innerText = "⏸";
musicCover.classList.add("playing");
};

/* 下一首 */
nextBtn.onclick = () => {
index = (index + 1) % playlist.length;
loadSong(index);
audio.play();
playBtn.innerText = "⏸";
musicCover.classList.add("playing");
};

/* 进度条 */
audio.ontimeupdate = () => {
progress.value = (audio.currentTime / audio.duration) * 100 || 0;
currentTime.innerText = format(audio.currentTime);
};

/* 拖动进度 */
progress.oninput = () => {
audio.currentTime = (progress.value / 100) * audio.duration;
};

/* 时长 */
audio.onloadedmetadata = () => {
duration.innerText = format(audio.duration);
};

/* 自动下一首 */
audio.onended = () => {
nextBtn.click();
};

/* 点击头像开关播放器 */
const avatar = document.getElementById("avatar");

avatar.onclick = () => {

    if(musicPlayer.classList.contains("hide")){
        musicPlayer.classList.remove("hide");
        musicPlayer.style.transform = "translateY(20px)";
        setTimeout(()=>{
            musicPlayer.style.transform = "translateY(0)";
        },50);
    }else{
        musicPlayer.style.transform = "translateY(20px)";
        setTimeout(()=>{
            musicPlayer.classList.add("hide");
        },200);
    }

};

/* 初始化 */
loadSong(index);

audio.autoplay = true;

audio.play().then(() => {
    playBtn.innerText = "⏸";
    musicCover.classList.add("playing");
}).catch(() => {
    console.log("浏览器阻止自动播放，需要用户交互");
});
 
</script>

<!-- 粒子背景 -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
  particles:{
    number:{
      value:60,
      density:{
        enable:true,
        value_area:800
      }
    },
    color:{
      value:"#4fc3f7"
    },
    shape:{
      type:"circle"
    },
    opacity:{
      value:0.5
    },
    size:{
      value:3,
      random:true
    },
    line_linked:{
      enable:true,
      distance:150,
      color:"#4fc3f7",
      opacity:0.35,
      width:1
    },
    move:{
      enable:true,
      speed:2,
      direction:"none",
      random:false,
      straight:false,
      out_mode:"out"
    }
  },
  interactivity:{
    detect_on:"canvas",
    events:{
      onhover:{
        enable:true,
        mode:"grab"
      },
      onclick:{
        enable:true,
        mode:"push"
      }
    },
    modes:{
      grab:{
        distance:180,
        line_linked:{
          opacity:0.8
        }
      },
      push:{
        particles_nb:4
      }
    }
  },
  retina_detect:true
});
const foldBtn = document.getElementById("foldBtn");

let folded = false;

foldBtn.onclick = () => {
    musicPlayer.classList.toggle("folded");

    if(musicPlayer.classList.contains("folded")){
        // 已折叠 → 显示展开按钮
        foldBtn.innerText = "←";
    }else{
        // 已展开 → 显示收起按钮
        foldBtn.innerText = "❌";
    }
};
</script>
